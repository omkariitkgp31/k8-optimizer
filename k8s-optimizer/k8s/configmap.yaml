apiVersion: v1
kind: ConfigMap
metadata:
  name: optimizer-config
  labels:
    app: k8s-optimizer
data:
  # Utilization thresholds
  CPU_HIGH_OVER_THRESH: "0.35"
  CPU_MOD_OVER_THRESH: "0.65"
  CPU_UNDER_THRESH: "0.85"
  MEM_HIGH_OVER_THRESH: "0.40"
  MEM_MOD_OVER_THRESH: "0.70"
  MEM_UNDER_THRESH: "0.85"
  
  # Safety buffer multipliers
  CPU_HIGH_BUFFER: "1.5"
  CPU_MOD_BUFFER: "1.3"
  CPU_UNDER_BUFFER: "1.2"
  MEM_HIGH_BUFFER: "1.5"
  MEM_MOD_BUFFER: "1.3"
  MEM_UNDER_BUFFER: "1.25"
  
  # Floors and rounding steps
  MIN_CPU: "50"
  MIN_MEM: "128"
  CPU_ROUND: "50"
  MEM_ROUND: "128"
  
  # Churn prevention
  NOISE_GATE_PCT: "0.15"
